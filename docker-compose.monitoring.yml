# Observability stack for the DEDICATED MONITORING INSTANCE.
#
# Standalone — does NOT join the app's Docker network (the app runs on a
# different host). Prometheus scrapes the app's /metrics over the private VPC
# using API_METRICS_TARGET (the app instance's private IP, e.g. 10.0.1.55:443).
#
# Bring up on the monitoring instance:
#   API_METRICS_TARGET="<app_private_ip>:443" \
#     docker compose -f docker-compose.monitoring.yml up -d
#
# View Grafana via SSH tunnel from your machine:
#   ssh -i privkey.pem -L 3000:localhost:3000 ec2-user@<monitoring_public_ip>
#   then open http://localhost:3000

services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s/API_METRICS_TARGET_PLACEHOLDER/${API_METRICS_TARGET:-APP_PRIVATE_IP_NOT_SET:443}/" \
          /etc/prometheus/prometheus.template.yml > /tmp/prometheus.yml
        exec /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus.remote.yml:/etc/prometheus/prometheus.template.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # localhost only — reach via SSH tunnel
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring

networks:
  monitoring:

volumes:
  prometheus_data:
  grafana_data: